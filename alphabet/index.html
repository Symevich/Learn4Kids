<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🔤 Алфавіт — Learn4Kids</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../tts.js"></script>
  <script src="../theme.js"></script>
</head>
<body>
<div class="page-card">
  <h1 class="page-title">🔤 Ангельскі алфавіт</h1>
  <p class="page-subtitle">Націсні на літару — пачуеш, як яна гучыць!</p>

  <div class="item-grid" id="letter-grid"></div>

  <div class="hint-panel" id="hint" aria-live="polite"></div>

  <a class="btn-back" href="../index.html">⬅️ Назад у меню</a>
</div>

<script>
/* Belarusian phonetic approximations for each letter name */
const LETTER_NAMES_BEL = {
  A:'эй',  B:'бі',     C:'сі',    D:'дзі',    E:'і',
  F:'эф',  G:'джы',    H:'эйч',   I:'ай',     J:'джэй',
  K:'кей', L:'эл',     M:'эм',    N:'эн',     O:'оў',
  P:'пі',  Q:'к\'ю',   R:'ар',    S:'эс',     T:'ці',
  U:'ю',   V:'ві',     W:'дабл-ю',X:'экс',    Y:'вай', Z:'зэд'
};

const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722',
  '#8bc34a','#795548','#607d8b'
];

const grid = document.getElementById('letter-grid');
const hint = document.getElementById('hint');

for (let i = 0; i < 26; i++) {
  const letter = String.fromCharCode(65 + i);
  const btn = document.createElement('button');
  btn.className = 'tile tile--lg';
  btn.textContent = letter;
  btn.style.backgroundColor = COLORS[i % COLORS.length];
  btn.addEventListener('click', () => speak(letter));
  grid.appendChild(btn);
}

function speak(letter) {
  const belName = LETTER_NAMES_BEL[letter] || '';

  hint.innerHTML =
    '<div class="hint-letter">' + letter + '</div>' +
    '<div><span class="lang-label lang-en">ENG</span> <span class="hint-word-en">' + letter + '</span></div>' +
    '<div><span class="lang-label lang-bel">БЕЛ</span> <span class="hint-word-bel">' + belName + '</span></div>';

  TTS.speak(letter);
}

TTS.preload();
</script>
</body>
</html>
