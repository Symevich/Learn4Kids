<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🐾 Жывёлы — Learn4Kids</title>
   <link rel="stylesheet" href="../style.css">
   <script src="../data.js"></script>
   <script src="../audio.js"></script>
   <script src="../theme.js"></script>
  <style>
    .animal-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
      user-select: none;
      background: var(--bg-animal-tile);
      box-shadow: var(--shadow-animal);
    }
    .animal-tile:hover  { transform: scale(1.12); box-shadow: var(--shadow-hover); }
    .animal-tile:active { transform: scale(0.94); }

    .animal-tile .animal-emoji { font-size: 42px; line-height: 1; }
    .animal-tile .animal-name  { font-size: 12px; font-weight: bold; color: var(--text-animal); margin-top: 4px; transition: color 0.3s; }
  </style>
</head>
<body>
<div class="page-card">
  <h1 class="page-title">🐾 Жывёлы</h1>
  <p class="page-subtitle">Націсні на жывёліну — пачуеш яе назву па-ангельску!</p>

  <div class="item-grid" id="animal-grid"></div>

  <div class="hint-panel" id="hint" aria-live="polite"></div>

  <a class="btn-back" href="../learn.html">⬅️ Назад у меню</a>
</div>

<script>
const grid = document.getElementById('animal-grid');
const hint = document.getElementById('hint');

LEARN4KIDS_DATA.animals.forEach(function(animal) {
  const tile = document.createElement('button');
  tile.className = 'animal-tile';
  tile.innerHTML =
    '<span class="animal-emoji">' + animal.display + '</span>' +
    '<span class="animal-name">' + animal.label + '</span>';
  tile.addEventListener('click', function() { speak(animal); });
  grid.appendChild(tile);
});

function speak(animal) {
  hint.innerHTML =
    '<div style="font-size:64px; line-height:1;">' + animal.display + '</div>' +
    '<div><span class="lang-label lang-en">ENG</span> <span class="hint-word-en">' + animal.label + '</span></div>' +
    '<div><span class="lang-label lang-bel">БЕЛ</span> <span class="hint-word-bel">' + animal.bel + '</span></div>';

  TTS.speak(animal.audio);
}
</script>
</body>
</html>
