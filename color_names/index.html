<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🌈 Colors — Learn4Kids</title>
  <style>
    body{font-family:Arial, sans-serif; background:#f8f9f8; text-align:center; margin:0; padding:20px}
    .wrap{ display:inline-block; padding:20px; background:white; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,.08); max-width:95vw;}
    h1{font-size:28px; margin:0 0 8px;}
    .grid{ display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:20px 0;}
    .box{ width:120px; height:80px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; cursor:pointer; }
    .hint{ margin-top:12px; font-size:20px; min-height:42px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌈 Colors — Name & Speak</h1>
    <p>Click a color block to hear its English name and see Belarusian translation.</p>
    <div class="grid" id="colorGrid"></div>
    <div class="hint" id="hint"></div>
    
	<div style="margin-top:16px">
  <a href="../index.html" class="btn" style="background:#2c3e50;color:white;padding:10px 16px;border-radius:6px;text-decoration:none">⬅️ Назад</a>
</div>
	
  </div>

  <script>
    const colors = [
      {en:'red', be:'чырвоны', hex:'#e74c3c'},
      {en:'blue', be:'сіні', hex:'#3498db'},
      {en:'green', be:'зялёны', hex:'#2ecc71'},
      {en:'yellow', be:'жоўты', hex:'#f1c40f'},
      {en:'orange', be:'аранжавы', hex:'#e67e22'},
      {en:'purple', be:'пурпурны', hex:'#9b59b6'},
      {en:'pink', be:'ружовы', hex:'#e91e63'},
      {en:'brown', be:'карычневы', hex:'#8b5e3c'},
      {en:'black', be:'чорны', hex:'#34495e'},
      {en:'white', be:'Белы', hex:'#bdc3c7'}
    ];
    const grid = document.getElementById('colorGrid');
    const hint = document.getElementById('hint');

    colors.forEach((c)=>{
      const div = document.createElement('div');
      div.className = 'box';
      div.style.backgroundColor = c.hex;
      div.textContent = c.en;
      div.onclick = ()=>{
        hint.innerHTML = '<div style="font-size:20px; font-weight:bold;">'+c.en+'</div>'+
                         '<div>🇬🇧 '+c.en+'</div>'+
                         '<div>🇧🇾 '+c.be+'</div>';
        if ('speechSynthesis' in window){
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(c.en);
          u.lang = 'en-US';
          u.rate = 0.95;
          window.speechSynthesis.speak(u);
        }
      };
      grid.appendChild(div);
    });
  </script>
</body>
</html>
