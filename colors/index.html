<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🌈 Колеры — Learn4Kids</title>
   <link rel="stylesheet" href="../style.css">
   <script src="../data.js"></script>
   <script src="../audio.js"></script>
   <script src="../theme.js"></script>
</head>
<body>
<div class="page-card">
  <h1 class="page-title">🌈 Колеры</h1>
  <p class="page-subtitle">Націсні на колер — пачуеш яго назву па-ангельску!</p>

  <div class="item-grid" id="color-grid"></div>

  <div class="hint-panel" id="hint" aria-live="polite"></div>

  <a class="btn-back" href="../learn.html">⬅️ Назад у меню</a>
</div>

<script>
const grid = document.getElementById('color-grid');
const hint = document.getElementById('hint');

LEARN4KIDS_DATA.colors.forEach(function(color) {
  const tile = document.createElement('div');
  tile.className = 'tile tile--wide';
  tile.style.backgroundColor = color.display;
  /* white tile needs dark text to be readable */
  tile.style.color = color.label === 'white' ? '#2c3e50' : '#ffffff';
  tile.textContent = color.label;
  tile.addEventListener('click', function() { speak(color); });
  grid.appendChild(tile);
});

function speak(color) {
  hint.innerHTML =
    '<div class="hint-word-en" style="font-size:32px; margin-bottom:6px;">' + color.label + '</div>' +
    '<div><span class="lang-label lang-en">ENG</span> <span class="hint-word-en">' + color.label + '</span></div>' +
    '<div><span class="lang-label lang-bel">БЕЛ</span> <span class="hint-word-bel">' + color.bel + '</span></div>';

  TTS.speak(color.audio);
}
</script>
</body>
</html>
