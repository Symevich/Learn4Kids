<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Colors & Shapes - Learn4Kids</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fff8;padding:20px}
    .card{max-width:640px;margin:0 auto;background:white;border-radius:8px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .shape{width:80px;height:80px;border-radius:50%;margin:10px;background:#8bc34a;display:inline-block}
    .tag{display:inline-block;padding:6px 8px;background:#eef6ff;border:1px solid #d0e0ff;margin:6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Colors & Shapes</h2>
    <p>Choose the color of the circle:</p>
    <div class="shape" id="circle" style="background:#4caf50"></div>
    <div>
      <button onclick="pick('red')">Red</button>
      <button onclick="pick('blue')">Blue</button>
      <button onclick="pick('green')">Green</button>
    </div>
    <div id="out" class="tag"></div>
  </div>
  <script>
    function pick(c){ document.getElementById('out').textContent = 'You picked: ' + c; }
  </script>
</body></html>
