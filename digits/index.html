<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🔢 Лічбы 0–9 — Learn4Kids</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../tts.js"></script>
  <script src="../theme.js"></script>
</head>
<body>
<div class="page-card">
  <h1 class="page-title">🔢 Лічбы 0–9</h1>
  <p class="page-subtitle">Націсні на лічбу — пачуеш вымаўленне!</p>

  <div class="item-grid" id="digit-grid"></div>

  <div class="hint-panel" id="hint" aria-live="polite"></div>

  <a class="btn-back" href="../index.html">⬅️ Назад у меню</a>
</div>

<script>
const DIGITS_EN = ['zero','one','two','three','four','five','six','seven','eight','nine'];
const DIGITS_BEL = ['нуль','адзін','два','тры','чатыры','пяць','шэсць','сем','восем','дзевяць'];
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'];

const grid = document.getElementById('digit-grid');
const hint = document.getElementById('hint');

for (let i = 0; i <= 9; i++) {
  const btn = document.createElement('button');
  btn.className = 'tile tile--md';
  btn.textContent = i;
  btn.style.backgroundColor = COLORS[i];
  btn.addEventListener('click', () => speak(i));
  grid.appendChild(btn);
}

function speak(n) {
  const enWord  = DIGITS_EN[n];
  const belWord = DIGITS_BEL[n];

  hint.innerHTML =
    '<div class="hint-number">' + n + '</div>' +
    '<div><span class="lang-label lang-en">ENG</span> <span class="hint-word-en">' + enWord + '</span></div>' +
    '<div><span class="lang-label lang-bel">БЕЛ</span> <span class="hint-word-bel">' + belWord + '</span></div>';

  TTS.speak(enWord);
}

TTS.preload();
</script>
</body>
</html>
