<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🔢 Лічбы 0–9 — Learn4Kids</title>
   <link rel="stylesheet" href="../style.css">
   <script src="../data.js"></script>
   <script src="../audio.js"></script>
   <script src="../theme.js"></script>
</head>
<body>
<div class="page-card">
  <h1 class="page-title">🔢 Лічбы 0–9</h1>
  <p class="page-subtitle">Націсні на лічбу — пачуеш вымаўленне!</p>

  <div class="item-grid" id="digit-grid"></div>

  <div class="hint-panel" id="hint" aria-live="polite"></div>

  <a class="btn-back" href="../learn.html">⬅️ Назад у меню</a>
</div>

<script>
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'];

const grid = document.getElementById('digit-grid');
const hint = document.getElementById('hint');

LEARN4KIDS_DATA.digits.forEach(function(digit, i) {
  const btn = document.createElement('button');
  btn.className = 'tile tile--md';
  btn.textContent = digit.display;
  btn.style.backgroundColor = COLORS[i];
  btn.addEventListener('click', () => speak(digit));
  grid.appendChild(btn);
});

function speak(digit) {
  hint.innerHTML =
    '<div class="hint-number">' + digit.display + '</div>' +
    '<div><span class="lang-label lang-en">ENG</span> <span class="hint-word-en">' + digit.label + '</span></div>' +
    '<div><span class="lang-label lang-bel">БЕЛ</span> <span class="hint-word-bel">' + digit.bel + '</span></div>';

  TTS.speak(digit.audio);
}
</script>
</body>
</html>
