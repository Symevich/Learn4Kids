<!doctype html>
<html lang="be">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🔢 Digits 0-9 — Learn4Kids</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f4ff; text-align:center; margin:0; padding:20px; }
.wrap { display:inline-block; padding:20px; background:white; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.08); max-width:95vw; }
h1 { font-size:28px; margin:0 0 8px; }
.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:20px 0; }
.btn { width:64px; height:64px; border-radius:12px; border:0; font-size:22px; font-weight:bold; color:white; cursor:pointer; }
.hint { font-size:22px; min-height:50px; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
<h1>🔢 Digits 0-9</h1>
<p>Натакніце лічбу — пачуеце вымаўленне і ўбачыце падказку.</p>

<div class="grid" id="numGrid"></div>

<div class="hint" id="hint" aria-live="polite"></div>

<div style="margin-top:12px">
  <a class="btn" href="../index.html" style="background:#2c3e50; width:auto; padding:8px 14px; border-radius:8px;">⬅️ Назад у меню</a>
</div>

</div>

<script>
// Англійскія назвы лікаў 0-9
const eng = ['zero','one','two','three','four','five','six','seven','eight','nine'];

// Беларускія назвы (для 0-9) - можa дадаць правільны пераклад
const be = {
  0: 'нуль',
  1: 'адзін',
  2: 'дзве', // альбо "два" у залежнасці ад кантэксту
  3: 'тры',
  4: 'чатыры',
  5: 'пяць',
  6: 'шэсць',
  7: 'сем',
  8: 'восем',
  9: 'дзевяць'
};

const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
                '#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'];

const grid = document.getElementById('numGrid');
const hint = document.getElementById('hint');

// Стварэнне кнопак 0-9
for (let i = 0; i <= 9; i++) {
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = i;
  btn.style.backgroundColor = colors[i % colors.length];
  btn.onclick = () => sayNumber(i);
  grid.appendChild(btn);
}

function sayNumber(n) {
  const enName = eng[n];
  const beName = be[n] || '';
  // Паказваем тэкст узнаёмі
  hint.innerHTML = '<div style="font-size:28px; font-weight:bold; color:#2c3e50;">' + n + '</div>' +
                   '<div>🇬🇧 ' + enName + '</div>' +
                   '<div>🇧🇾 ' + beName + '</div>';

  // Вымоўляем англійскую назву
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(enName);
    u.lang = 'en-US';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }
}

</script>
</body>
</html>
