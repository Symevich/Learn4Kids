<!doctype html>
<html>
<head><meta charset="utf-8"><title>Listening</title></head>
<body>
  <h1>Listening Practice</h1>
  <p>Simple phrases for English learners.</p>
  <button onclick="say('Hello')">Hello</button>
  <button onclick="say('How are you?')">How are you?</button>
  <button onclick="say('My name is Learn4Kids')">My name is Learn4Kids</button>
  <div id="out"></div>
  <script>
    function say(t){ document.getElementById('out').textContent = t; }
  </script>
</body>
</html>
