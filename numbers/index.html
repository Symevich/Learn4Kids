<!doctype html>
<html lang="be">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🔢 Лікі 10–100 — Learn4Kids</title>
   <link rel="stylesheet" href="../style.css">
   <script src="../data.js"></script>
   <script src="../audio.js"></script>
   <script src="../theme.js"></script>
</head>
<body>
<div class="page-card">
  <h1 class="page-title">🔢 Лікі 10–100</h1>
  <p class="page-subtitle">Націсні на лік — пачуеш, як ён гучыць па-ангельску!</p>

  <div class="item-grid" id="number-grid"></div>

  <div class="hint-panel" id="hint" aria-live="polite"></div>

  <a class="btn-back" href="../learn.html">⬅️ Назад у меню</a>
</div>

<script>
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'];

/* ---------- build grid ---------- */
const grid = document.getElementById('number-grid');
const hint = document.getElementById('hint');

for (let n = 10; n <= 100; n++) {
  const btn = document.createElement('button');
  btn.className = 'tile tile--sm';
  btn.textContent = n;
  btn.style.backgroundColor = COLORS[(n - 1) % COLORS.length];
  btn.addEventListener('click', () => speak(n));
  grid.appendChild(btn);
}

function speak(n) {
  const enWord  = LEARN4KIDS_DATA.numbersEN[n]  || String(n);
  const belWord = LEARN4KIDS_DATA.numbersBEL[n] || '';

  hint.innerHTML =
    '<div class="hint-number">' + n + '</div>' +
    '<div><span class="lang-label lang-en">ENG</span> <span class="hint-word-en">' + enWord + '</span></div>' +
    '<div><span class="lang-label lang-bel">БЕЛ</span> <span class="hint-word-bel">' + belWord + '</span></div>';

  TTS.speak(enWord);
}
</script>
</body>
</html>
